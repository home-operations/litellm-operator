              modelName:
                description: ModelName is the public name clients call (model_list[].model_name).
                type: string
              params:
                description: Params is the litellm_params block for this model.
                properties:
                  additional:
                    description: |-
                      Additional holds any further litellm_params, merged verbatim under the typed
                      fields (which win on conflict).
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  apiBase:
                    description: APIBase is the provider base URL. Accepts a literal
