                    properties:
                      key:
                        description: Key within the Secret holding the value.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  apiVersion:
                    description: APIVersion for providers that require it (e.g. Azure).
                    type: string
                  dropParams:
