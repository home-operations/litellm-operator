---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
  name: main
  namespace: ai
spec:
  image: ghcr.io/berriai/litellm:main-stable
  replicas: 1
  # No modelSelector: this proxy adopts every model/guardrail/MCP server in its namespace.
  generalSettings:
    health_check_endpoint: /v1/health
  routerSettings:
    routing_strategy: simple-shuffle
  callbacks:
    success:
      - prometheus
    settings:
      otel:
        exporter: otlp
  envFrom:
    - secretRef:
        name: litellm-secrets
  route:
    hostnames:
      - litellm.example.com
    parentRefs:
      - name: envoy-external
        namespace: network
---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMModel
metadata:
  name: glm-5-2
  namespace: ai
spec:
  modelName: glm-5.2
  params:
    model: openai/glm-5.2
    apiBase: https://api.z.ai/api/coding/paas/v4
    apiKeyRef:
      name: litellm-secrets
      key: ZAI_API_KEY
    dropParams: true
  info:
    maxInputTokens: 1000000
    maxOutputTokens: 131072
    supportsFunctionCalling: true
    supportsPromptCaching: true
---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMGuardrail
metadata:
  name: aporia-pre
  namespace: ai
spec:
  guardrailName: aporia-pre-guard
  guardrail: aporia
  mode: pre_call
  defaultOn: true
  apiKeyRef:
    name: litellm-secrets
    key: APORIA_API_KEY
---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: github
  namespace: ai
spec:
  alias: github
  url: https://api.githubcopilot.com/mcp
  transport: http
  authTokenRef:
    name: litellm-secrets
    key: GITHUB_MCP_PAT
