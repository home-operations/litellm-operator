# LLMKube auto-registration: when ENABLE_LLMKUBE_AUTOREGISTER is set (Helm:
# llmkube.autoRegister=true) the operator mirrors a Ready LLMKube
# InferenceService into a LiteLLMModel in the SAME namespace. A proxy adopts it
# like any other model — here via a modelSelector matching the managed-by label.
#
# You write the Model + InferenceService (LLMKube CRs) and the LiteLLMProxy.
# The LiteLLMModel below is generated by the operator; it is shown only to
# illustrate the projection and should not be applied by hand.
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: llama3-8b
  namespace: ai
spec:
  source: https://huggingface.co/.../Llama-3-8B-Instruct.Q4_K_M.gguf
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama3
  namespace: ai
spec:
  modelRef: llama3-8b
---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
  name: main
  namespace: ai
spec:
  # Adopt every operator-generated model from LLMKube. Drop the selector to
  # adopt all models in the namespace (generated and hand-written alike).
  modelSelector:
    matchLabels:
      litellm.home-operations.com/managed-by: llmkube
---
