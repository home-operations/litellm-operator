[[remotes]]
git_url = "https://github.com/home-operations/.github"
ref = "main"
configs = ["lefthook.common.toml"]

# Regenerate the chart's committed README + values.schema.json whenever their inputs
# change, and stage them. CI's helm-docs-check is the backstop.
[pre-commit.commands.helm-docs]
glob = [
  "charts/litellm-operator/Chart.yaml",
  "charts/litellm-operator/values.yaml",
  "charts/litellm-operator/README.md.gotmpl",
]
run = "mise run helm-docs && git add charts/litellm-operator/README.md charts/litellm-operator/values.schema.json"

# The generated chart README/schema are .prettierignore'd; exclude them from the
# shared formatters too (oxfmt exits non-zero when every input is ignored).
[pre-commit.commands.format-markdown]
exclude = ["charts/litellm-operator/README.md"]

[pre-commit.commands.format-json]
exclude = ["charts/litellm-operator/values.schema.json"]

# The generated CRD/RBAC/webhook manifests are .prettierignore'd; exclude them
# from the shared yaml formatter too (oxfmt exits non-zero when every input is
# ignored, e.g. a commit that only touches a regenerated CRD).
[pre-commit.commands.format-yaml]
exclude = [
  "config/crd/bases/*",
  "config/rbac/role.yaml",
  "config/webhook/manifests.yaml",
]
