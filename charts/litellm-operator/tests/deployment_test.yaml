---
suite: deployment
templates:
  - templates/deployment.tpl
tests:
  - it: renders a Deployment running the manager
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].name
          value: manager
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: /manager

  - it: defaults the image to the ghcr repository
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/home-operations/litellm-operator:"

  - it: pins by digest when set
    set:
      image.digest: sha256:deadbeef
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "@sha256:deadbeef$"

  - it: enables leader election by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-elect=true

  - it: disables metrics by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=0

  - it: exposes the metrics port when metrics are enabled
    set:
      controller.metrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 8443
            protocol: TCP
