---
# Default values for litellm-operator.

# -- Number of operator replicas (one is active at a time when leader election is on).
replicaCount: 1

image:
  # -- Image repository.
  repository: ghcr.io/home-operations/litellm-operator
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag; defaults to the chart appVersion.
  tag: ""
  # -- Pin the image by digest (sha256:…); when set, overrides the tag.
  digest: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full release name.
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # -- Automount the API token.
  automount: true
  # -- Annotations for the ServiceAccount.
  annotations: {}
  # -- Name of the ServiceAccount; generated when empty.
  name: ""

rbac:
  # -- Create the ClusterRole/ClusterRoleBinding and leader-election Role.
  create: true
  # -- Annotations for the RBAC resources.
  annotations: {}

controller:
  # -- Log level (debug, info).
  logLevel: info
  leaderElection:
    # -- Enable leader election so only one replica reconciles at a time.
    enabled: true
  metrics:
    # -- Operational port: /metrics plus the /healthz and /readyz probes (plain HTTP;
    # restrict with a NetworkPolicy if needed).
    port: 8081
    # -- Annotations for the metrics Service.
    annotations: {}

webhook:
  # -- Enable the validating admission webhook. The operator self-manages the
  # serving certificate (no cert-manager dependency) and patches the CA bundle
  # into the ValidatingWebhookConfiguration.
  enabled: true
  # -- Webhook server container port.
  port: 9443

llmkube:
  # -- Auto-register LiteLLMModels from LLMKube (inference.llmkube.dev)
  # InferenceServices. When a service reaches Ready, the operator creates a
  # matching LiteLLMModel in the same namespace, which proxies adopt as usual.
  # Adds RBAC for inference.llmkube.dev and sets ENABLE_LLMKUBE_AUTOREGISTER.
  # No-op (logs a warning) if the LLMKube CRDs are not installed.
  autoRegister: false

# -- Extra environment variables for the operator container.
env: []

# -- Pod annotations.
podAnnotations: {}
# -- Pod labels.
podLabels: {}

# -- Pod-level security context.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Operator container resource requests/limits.
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Priority class for the operator pod.
priorityClassName: ""
# -- Node selector.
nodeSelector: {}
# -- Tolerations.
tolerations: []
# -- Affinity.
affinity: {}
